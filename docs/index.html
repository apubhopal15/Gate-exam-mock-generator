<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GATE 2026 ECE Mock Test</title>
<style>
  :root { --navy: #0d1b3e; --gold: #f0a500; --card: #ffffff; --bg: #f2f3f7; }
  * { box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; color: #222; }
  header { background: var(--navy); color: white; padding: 20px; text-align: center; }
  header h1 { margin: 0; font-size: 24px; }
  header p { margin: 5px 0 0; color: var(--gold); font-size: 14px; }
  .container { max-width: 980px; margin: 20px auto; padding: 0 15px; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 16px 0; }
  .card { background: var(--card); border-radius: 8px; padding: 20px; margin-bottom: 15px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .q-header { font-size: 12px; color: #777; margin-bottom: 8px; }
  .book-shot { border: 1px solid #d8dce7; background: #fffdf8; padding: 14px; margin: 10px 0 14px; border-radius: 6px; font-family: Georgia, 'Times New Roman', serif; line-height: 1.5; font-size: 16px; font-weight: 600; }
  .options label { display: block; padding: 8px 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; }
  .options label:hover { background: #f7f7f7; }
  input[type="text"] { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
  .controls { text-align: center; margin: 20px 0; }
  button { background: var(--gold); color: var(--navy); border: none; padding: 12px 24px; font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; }
  button:hover { opacity: 0.9; }
  .correct { border-color: #2e7d32 !important; background: #e8f5e9; }
  .incorrect { border-color: #c62828 !important; background: #ffebee; }
  .explanation { margin-top: 10px; font-size: 13px; color: #555; background: #fafafa; padding: 8px; border-radius: 6px; }
  #score-banner { display: none; background: var(--navy); color: white; padding: 15px; border-radius: 8px; text-align: center; font-size: 18px; margin-bottom: 15px; }
  #analysis-panel, #self-check-panel { display: none; }
  .analysis-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
  .metric { background: #f7f9fc; border: 1px solid #dce3ef; border-radius: 6px; padding: 10px; }
  .self-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
  .self-table th, .self-table td { border: 1px solid #d9dde8; padding: 8px; vertical-align: top; }
  .self-table th { background: #eef2f8; }
  textarea.self-note, select.confidence { width: 100%; border: 1px solid #d7dce8; border-radius: 5px; padding: 6px; }
  .page-break { display: none; }
  @media print {
    body { background: white; }
    header, .toolbar, .controls, #score-banner, #analysis-panel { display: none !important; }
    .container { max-width: none; margin: 0; padding: 0; }
    .card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
    .options input, input[type="text"], textarea, select { display: none; }
    .explanation { display: none !important; }
    .page-break { display: block; break-after: page; }
  }
</style>
</head>
<body>
<header><h1>GATE 2026 ECE Mock Test</h1><p>Book-style practice, answer checking, self review sheet, and topic analysis</p></header>
<div class="container">
  <div id="score-banner"></div>
  <div class="toolbar">
    <button onclick="showFourPageBook()">4 Page Book View</button>
    <button onclick="window.print()">Print / Save PDF</button>
    <button onclick="toggleSelfCheck()">Self Check Sheet</button>
  </div>
  <div class="card" id="analysis-panel"></div>
  <div class="card" id="self-check-panel"></div>
  <div id="quiz-root">Loading questions...</div>
  <div class="controls"><button id="submit-btn" onclick="gradeQuiz()">Submit Test</button></div>
</div>
<script>
let questions = [];
let answerKey = {};
let lastReport = [];
const SUBJECTS = ["engineering_mathematics", "networks_signals_systems", "electronic_devices", "analog_circuits", "digital_circuits", "control_systems", "communications", "electromagnetics", "general_aptitude"];
const DATA_PREFIX = location.pathname.includes("/docs/") ? "../data/" : "data/";
const QUESTION_FILES = SUBJECTS.map(s => `${DATA_PREFIX}questions_${s}.json`);
const ANSWER_FILES = SUBJECTS.map(s => `${DATA_PREFIX}answers_${s}.json`);
async function loadData() {
  try {
    for (const file of QUESTION_FILES) { const res = await fetch(file); questions = questions.concat(await res.json()); }
    for (const file of ANSWER_FILES) { const res = await fetch(file); answerKey = Object.assign(answerKey, await res.json()); }
    renderQuiz();
  } catch (error) { document.getElementById("quiz-root").textContent = "Questions could not load. Please open through a local server or GitHub Pages."; }
}
function escapeHtml(value) { return String(value ?? "").replace(/[&<>'"]/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[ch])); }
function renderQuiz() {
  const root = document.getElementById("quiz-root"); root.innerHTML = "";
  questions.forEach((q, idx) => {
    const card = document.createElement("div"); card.className = "card"; card.id = "card-" + q.id;
    const optionsHtml = q.type === "MCQ" ? '<div class="options">' + q.options.map(opt => `<label><input type="radio" name="${q.id}" value="${escapeHtml(opt)}"> ${escapeHtml(opt)}</label>`).join("") + "</div>" : `<input type="text" name="${q.id}" placeholder="Enter numerical answer">`;
    card.innerHTML = `<div class="q-header">Q${idx + 1} | ${escapeHtml(q.topic)} | ${escapeHtml(q.type)}</div><div class="book-shot">${escapeHtml(q.question)}</div>${optionsHtml}<div class="explanation" id="exp-${q.id}" style="display:none;"></div>`;
    root.appendChild(card);
  });
}
function gradeQuiz() {
  let score = 0; const topicStats = {}; lastReport = [];
  questions.forEach(q => {
    const card = document.getElementById("card-" + q.id);
    const correct = answerKey[q.id] ? answerKey[q.id].answer.toString().trim() : "";
    let userAnswer = "";
    if (q.type === "MCQ") {
      const checked = card.querySelector(`input[name="${q.id}"]:checked`); userAnswer = checked ? checked.value.trim() : "";
      card.querySelectorAll("label").forEach(label => { label.classList.remove("correct", "incorrect"); const val = label.textContent.trim(); if (val === correct) label.classList.add("correct"); else if (checked && val === userAnswer) label.classList.add("incorrect"); });
    } else {
      const input = card.querySelector(`input[name="${q.id}"]`); userAnswer = input.value.trim(); input.classList.remove("correct", "incorrect"); input.classList.add(userAnswer.toLowerCase() === correct.toLowerCase() ? "correct" : "incorrect");
    }
    const isCorrect = Boolean(userAnswer && correct && userAnswer.toLowerCase() === correct.toLowerCase()); if (isCorrect) score++;
    if (!topicStats[q.topic]) topicStats[q.topic] = { total: 0, correct: 0 }; topicStats[q.topic].total++; if (isCorrect) topicStats[q.topic].correct++;
    const confidence = document.getElementById(`confidence-${q.id}`)?.value || ""; const note = document.getElementById(`note-${q.id}`)?.value || "";
    lastReport.push({ id: q.id, topic: q.topic, type: q.type, userAnswer, correct, isCorrect, confidence, note });
    const expDiv = document.getElementById("exp-" + q.id); if (answerKey[q.id]) { expDiv.style.display = "block"; expDiv.innerHTML = `<b>Answer:</b> ${escapeHtml(correct)}` + (answerKey[q.id].explanation ? `<br><b>Explanation:</b> ${escapeHtml(answerKey[q.id].explanation)}` : ""); }
  });
  const banner = document.getElementById("score-banner"); banner.style.display = "block"; banner.textContent = `Score: ${score} / ${questions.length}`;
  renderAnalysis(score, topicStats); renderSelfCheck(true); window.scrollTo({ top: 0, behavior: "smooth" });
}
function renderAnalysis(score, topicStats) {
  const panel = document.getElementById("analysis-panel"); const accuracy = Math.round((score / questions.length) * 100);
  const rows = Object.entries(topicStats).sort((a,b) => (a[1].correct/a[1].total) - (b[1].correct/b[1].total)).map(([topic, stat]) => { const pct = Math.round((stat.correct / stat.total) * 100); return `<div class="metric"><b>${escapeHtml(topic)}</b><br>${stat.correct}/${stat.total} correct (${pct}%)</div>`; }).join("");
  const wrong = lastReport.filter(r => !r.isCorrect).length; const lowConfidenceCorrect = lastReport.filter(r => r.isCorrect && r.confidence === "low").length;
  panel.style.display = "block"; panel.innerHTML = `<h2>Result Analysis</h2><div class="analysis-grid"><div class="metric"><b>Score</b><br>${score} / ${questions.length}</div><div class="metric"><b>Accuracy</b><br>${accuracy}%</div><div class="metric"><b>Needs Review</b><br>${wrong} questions</div><div class="metric"><b>Guessed Correct</b><br>${lowConfidenceCorrect} questions</div></div><h3>Topic Performance</h3><div class="analysis-grid">${rows}</div>`;
}
function toggleSelfCheck() { const panel = document.getElementById("self-check-panel"); if (panel.style.display === "block") { panel.style.display = "none"; return; } renderSelfCheck(false); }
function renderSelfCheck(afterSubmit) {
  const panel = document.getElementById("self-check-panel"); panel.style.display = "block";
  const source = afterSubmit && lastReport.length ? lastReport : questions.map(q => ({ id: q.id, topic: q.topic, type: q.type, userAnswer: "", correct: "", isCorrect: false, confidence: "", note: "" }));
  panel.innerHTML = `<h2>Student Self Check Sheet</h2><p>Fill confidence and notes for each question. After submit, this sheet matches your answer with the key and shows what to revise.</p><table class="self-table"><thead><tr><th>Q</th><th>Topic</th><th>Your answer</th><th>Correct answer</th><th>Confidence</th><th>Self note</th><th>Status</th></tr></thead><tbody>${source.map((r, idx) => `<tr><td>${idx + 1}</td><td>${escapeHtml(r.topic)}</td><td>${escapeHtml(r.userAnswer || "-")}</td><td>${escapeHtml(r.correct || "After submit")}</td><td><select class="confidence" id="confidence-${r.id}"><option value="">Select</option><option value="high" ${r.confidence === "high" ? "selected" : ""}>Sure</option><option value="medium" ${r.confidence === "medium" ? "selected" : ""}>Half sure</option><option value="low" ${r.confidence === "low" ? "selected" : ""}>Guess</option></select></td><td><textarea class="self-note" id="note-${r.id}" rows="2" placeholder="Formula, concept, mistake">${escapeHtml(r.note || "")}</textarea></td><td>${afterSubmit ? (r.isCorrect ? "Correct" : "Review") : "Pending"}</td></tr>`).join("")}</tbody></table>`;
}
function showFourPageBook() {
  const root = document.getElementById("quiz-root"); root.querySelectorAll(".page-break").forEach(el => el.remove()); const cards = [...root.querySelectorAll(".card")]; const pageSize = Math.ceil(cards.length / 4);
  cards.forEach((card, idx) => { if ((idx + 1) % pageSize === 0 && idx < cards.length - 1) card.insertAdjacentHTML("afterend", '<div class="page-break"></div>'); });
  alert("4 page book view ready. Use Print / Save PDF to make booklet pages.");
}
loadData();
</script>
</body>
</html>
